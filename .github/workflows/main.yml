name: Build DLL

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: |
          msbuild IdaLovesMe.sln ^
            /p:Configuration=Release ^
            /p:Platform=x64 ^
            /m

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: IdaLovesMe-DLL
          path: |
            **/Release/**/*.dll
            **/x64/Release/**/*.dll
